<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmChain Admin Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sidebar-link.active {
            background-color: rgba(16, 185, 129, 0.1);
            color: #10b981;
            box-shadow: inset 0 0 0 1px rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900">

    <!-- Notification Toast -->
    <div id="notification" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 hidden animate-in slide-in-from-top-4">
        <div class="bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3">
            <i class="fas fa-check-circle text-emerald-400"></i>
            <span id="notification-text" class="text-sm font-medium">Action successful</span>
        </div>
    </div>

   

    <!-- Main App Container (Hidden by default) -->
    <div id="app-container" class="min-h-screen flex">
        
        <!-- Sidebar -->
        <aside class="hidden lg:flex w-64 bg-slate-900 flex-col sticky top-0 h-screen">
            <div class="p-6 border-b border-slate-800">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-emerald-500 rounded flex items-center justify-center font-bold text-white italic">F</div>
                    <span class="text-xl font-bold text-white tracking-tight">FarmChain</span>
                </div>
            </div>
            <nav class="flex-1 p-4 space-y-2 mt-4 overflow-y-auto custom-scrollbar">
                <button onclick="navigateTo('dashboard')" id="nav-dashboard" class="sidebar-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400 hover:bg-white/5 active">
                    <i class="fas fa-chart-line w-5"></i> Main Dashboard
                </button>

                <div class="pt-4 pb-2 px-3 text-[10px] font-bold text-slate-500 uppercase tracking-widest opacity-50">Governance</div>
                <button onclick="navigateTo('complaints')" id="nav-complaints" class="sidebar-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400 hover:bg-white/5">
                    <i class="fas fa-exclamation-triangle w-5"></i> Complaints
                </button>
                <button onclick="navigateTo('investigation')" id="nav-investigation" class="sidebar-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400 hover:bg-white/5">
                    <i class="fas fa-search-dollar w-5"></i> Investigation
                </button>
                <button onclick="navigateTo('admins')" id="nav-admins" class="sidebar-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400 hover:bg-white/5">
                    <i class="fas fa-user-shield w-5"></i> System Admins
                </button>

                <div class="pt-8 pb-2 px-3 text-[10px] font-bold text-emerald-500 uppercase tracking-widest opacity-80">Portal Viewports</div>
                <a href="farmer-dashboard.html" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400 hover:bg-white/5 hover:text-white transition-all">
                    <i class="fas fa-tractor w-5"></i> Farmer Console
                </a>
                <a href="distributor-dashboard.html" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400 hover:bg-white/5 hover:text-white transition-all">
                    <i class="fas fa-truck-ramp-box w-5"></i> Distributor Console
                </a>
                <a href="consumer-dashboard.html" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400 hover:bg-white/5 hover:text-white transition-all">
                    <i class="fas fa-cart-shopping w-5"></i> Marketplace View
                </a>
                <a href="regulator-dashboard.html" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400 hover:bg-white/5 hover:text-white transition-all">
                    <i class="fas fa-building-columns w-5"></i> Regulatory Portal
                </a>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto custom-scrollbar">
            <header class="bg-white border-b border-slate-200 py-4 px-8 sticky top-0 z-10 flex justify-between items-center">
                <div class="text-sm text-slate-400 font-medium">FarmChain Admin Console</div>
                <div class="flex items-center gap-4">
                    <button onclick="handleLogout()" class="flex items-center gap-2 px-4 py-2 rounded-xl bg-red-50 text-red-600 hover:bg-red-100 transition-colors text-xs font-bold">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                    <div class="w-8 h-8 rounded-full bg-slate-200 border border-slate-300 overflow-hidden">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Admin">
                    </div>
                </div>
            </header>

            <div id="content-mount" class="p-8 max-w-7xl mx-auto">
                <!-- Content injected here via JS -->
            </div>
        </main>
    </div>
    <!-- Add User Modal -->
    <div id="add-user-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-6 animate-in fade-in duration-300">
        <div class="bg-white rounded-[2rem] p-10 max-w-lg w-full shadow-2xl space-y-8 max-h-[90vh] overflow-y-auto custom-scrollbar">
            <div class="flex justify-between items-center">
                <h3 class="text-2xl font-bold text-slate-800">New Network Entity</h3>
                <button onclick="toggleModal('add-user-modal', false)" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times"></i></button>
            </div>
            <form id="userDataForm" onsubmit="handleCreateUser(event)" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Role Type</label>
                        <select name="role" id="roleSelect" onchange="toggleFarmerFields()" required class="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:border-emerald-500 transition-all font-medium">
                            <option value="farmer">Farmer</option>
                            <option value="distributor">Distributor</option>
                            <option value="consumer">Consumer</option>
                            <option value="regulator">Regulator</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Full Name</label>
                        <input name="name" required type="text" placeholder="Samuel Green" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:border-emerald-500 transition-all font-medium">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Email Address</label>
                    <input name="email" required type="email" placeholder="samuel@farmchain.io" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:border-emerald-500 transition-all font-medium">
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Security Credential</label>
                    <input name="password" required type="password" placeholder="••••••••" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:border-emerald-500 transition-all font-medium">
                </div>

                <!-- Farmer Specific Fields (Dynamic) -->
                <div id="farmer-fields" class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Farm Name</label>
                        <input name="farmName" type="text" placeholder="Green Valley" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:border-emerald-500 transition-all font-medium">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Location</label>
                        <input name="location" type="text" placeholder="California, US" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:border-emerald-500 transition-all font-medium">
                    </div>
                </div>

                <button type="submit" class="w-full bg-slate-900 text-white py-5 rounded-xl font-bold text-sm hover:bg-slate-800 transition-all shadow-xl mt-4 uppercase tracking-widest">Register to Ledger</button>
            </form>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div id="edit-user-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-6 animate-in fade-in duration-300">
        <div class="bg-white rounded-[2rem] p-10 max-w-lg w-full shadow-2xl space-y-8 max-h-[90vh] overflow-y-auto custom-scrollbar">
            <div class="flex justify-between items-center">
                <h3 class="text-2xl font-bold text-slate-800">Modify Entity</h3>
                <button onclick="toggleModal('edit-user-modal', false)" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times"></i></button>
            </div>
            <form id="editUserDataForm" onsubmit="handleUpdateUser(event)" class="space-y-4">
                <input type="hidden" name="_id" id="edit-user-id">
                
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Full Name</label>
                    <input name="name" id="edit-user-name" required type="text" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:border-emerald-500 transition-all font-medium">
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Email Address</label>
                    <input name="email" id="edit-user-email" required type="email" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:border-emerald-500 transition-all font-medium">
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Update Password (Leave blank to keep current)</label>
                    <input name="password" type="password" placeholder="••••••••" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:border-emerald-500 transition-all font-medium">
                </div>

                <!-- Entity Role (Read Only for safety in this view, or change if needed) -->
                <div class="space-y-2 opacity-50">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">System Role (Immutable)</label>
                    <input id="edit-user-role" disabled class="w-full p-4 bg-slate-100 border border-slate-100 rounded-xl outline-none font-medium text-slate-500">
                </div>

                <button type="submit" class="w-full bg-emerald-600 text-white py-5 rounded-xl font-bold text-sm hover:bg-emerald-500 transition-all shadow-xl mt-4 uppercase tracking-widest">Commit Changes</button>
            </form>
        </div>
    </div>

    <!-- Purge Confirmation Modal -->
    <div id="purge-confirm-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden z-[100] flex items-center justify-center p-6 animate-in zoom-in-95 duration-200">
        <div class="bg-white rounded-[3rem] p-12 max-w-sm w-full shadow-2xl text-center space-y-6 border-4 border-rose-50">
            <div class="w-20 h-20 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto text-3xl">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <div>
                <h3 class="text-2xl font-black text-slate-800">Confirm Purge</h3>
                <p class="text-xs text-slate-400 font-bold uppercase tracking-widest mt-2 leading-relaxed">This entity will be permanently removed from the FarmChain network ledger.</p>
            </div>
            <div class="flex flex-col gap-3 pt-4">
                <button id="confirm-purge-btn" onclick="executePurge()" class="w-full bg-rose-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-rose-700 transition-all shadow-lg shadow-rose-200">Purge from Ledger</button>
                <button onclick="toggleModal('purge-confirm-modal', false)" class="w-full bg-slate-50 text-slate-400 py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-slate-100 transition-all">Cancel Action</button>
            </div>
        </div>
    </div>

    <script>
        let usersData = [];
        let complaintsData = [];
        let currentPage = 'dashboard';

        function toggleFarmerFields() {
            const role = document.getElementById('roleSelect').value;
            const fields = document.getElementById('farmer-fields');
            if (role === 'farmer') fields.classList.remove('hidden');
            else fields.classList.add('hidden');
        }

        async function initAdminDashboard() {
            try {
                const response = await fetch('/api/auth/me', { credentials: 'include' });
                const result = await response.json();
                
                if (result.success) { // Relaxed for Showcase Mode
                    document.getElementById('app-container').classList.remove('hidden');
                    await loadSystemData();
                    navigateTo('dashboard');
                    toggleFarmerFields();
                } else {
                    window.location.href = 'common-login.html';
                }
            } catch (err) {
                console.error(err);
                window.location.href = 'common-login.html';
            }
        }

        document.addEventListener("DOMContentLoaded", initAdminDashboard);

        let globalStats = null;

        async function loadSystemData() {
            try {
                // 1. Fetch Stats (Independent)
                try {
                    const statsRes = await fetch('/api/network-intelligence', { credentials: 'include' });
                    if (statsRes.ok) {
                        const statsResult = await statsRes.json();
                        if (statsResult.success) globalStats = statsResult.data;
                    }
                } catch (e) {
                    console.warn('Network Intelligence feed unreachable.');
                }

                // 2. Fetch Users (Core)
                try {
                    const userRes = await fetch('/api/users', { credentials: 'include' });
                    const userJson = await userRes.json();
                    if (userJson.success) usersData = userJson.data;
                } catch (e) {
                    console.error('Failed to load user directory.');
                }

                // 3. Fetch Complaints (Auxiliary)
                try {
                    const compRes = await fetch('/api/complaints', { credentials: 'include' });
                    const compJson = await compRes.json();
                    if (compJson.success) complaintsData = compJson.data;
                } catch (e) {
                    console.warn('Complaints log unavailable.');
                }

                if (currentPage) navigateTo(currentPage);
            } catch (err) {
                console.error('Critical Dashboard Failure:', err);
            }
        }

        async function handleLogout() {
            try {
                await fetch('/api/auth/logout', { credentials: 'include' });
                sessionStorage.removeItem('role');
                window.location.href = 'common-login.html';
            } catch (err) {
                console.error('Logout error:', err);
            }
        }

        function navigateTo(page) {
            currentPage = page;
            document.querySelectorAll('.sidebar-link').forEach(link => {
                link.classList.remove('active');
                if (link.id === `nav-${page}`) link.classList.add('active');
            });

            const mount = document.getElementById('content-mount');
            mount.innerHTML = `<div class="fade-in">${renderPage(page)}</div>`;
        }

        function renderPage(page) {
            switch(page) {
                case 'dashboard': return renderDashboard();
                case 'farmers': return renderUsersByRole('farmer', 'Farmer Directory');
                case 'distributors': return renderUsersByRole('distributor', 'Distributor Network');
                case 'customers': return renderUsersByRole('consumer', 'Consumer Directory');
                case 'regulators': return renderUsersByRole('regulator', 'Regulatory Authorities');
                case 'admins': return renderUsersByRole('admin', 'Admin System Team');
                case 'complaints': return renderComplaints();
                case 'investigation': return renderInvestigation();
                default: return renderDashboard();
            }
        }

        function renderDashboard() {
            const counts = {
                farmer: usersData.filter(u => u.role === 'farmer').length,
                distributor: usersData.filter(u => u.role === 'distributor').length,
                consumer: usersData.filter(u => u.role === 'consumer').length,
                regulator: usersData.filter(u => u.role === 'regulator').length,
                admin: usersData.filter(u => u.role === 'admin').length
            };

            const stats = globalStats || { totalEntities: 0, totalBatches: 0, totalComplaints: 0, activeShipments: 0 };

            return `
                <div class="space-y-8">
                    <!-- Global Intelligence Hub -->
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        ${renderStatsCard('Total Network Entities', stats.totalEntities, 'fa-users', 'bg-blue-500', 'text-blue-500')}
                        ${renderStatsCard('Supply Chain Batches', stats.totalBatches, 'fa-box', 'bg-emerald-500', 'text-emerald-500')}
                        ${renderStatsCard('Active Shipments', stats.activeShipments, 'fa-truck-fast', 'bg-orange-500', 'text-orange-500')}
                        ${renderStatsCard('Escalated Disputes', stats.totalComplaints, 'fa-exclamation-triangle', 'bg-rose-500', 'text-rose-500')}
                    </div>

                    <section class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                        <div class="p-6 border-b border-slate-100 bg-slate-50/50 flex items-center justify-between">
                            <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                                <i class="fas fa-user-cog text-emerald-500"></i> Manage User Access
                            </h2>
                            <button onclick="toggleModal('add-user-modal', true)" class="bg-slate-900 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-slate-800 transition-all flex items-center gap-2">
                                <i class="fas fa-plus"></i> New Entity
                            </button>
                        </div>
                        <div class="p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
                            ${renderMiniCard('Farmers', counts.farmer, 'fa-users', 'text-blue-500', 'farmers')}
                            ${renderMiniCard('Distributors', counts.distributor, 'fa-truck', 'text-orange-500', 'distributors')}
                            ${renderMiniCard('Consumers', counts.consumer, 'fa-shopping-bag', 'text-purple-500', 'customers')}
                            ${renderMiniCard('Regulators', counts.regulator, 'fa-shield-alt', 'text-emerald-500', 'regulators')}
                            ${renderMiniCard('Admins', counts.admin, 'fa-user-shield', 'text-slate-500', 'admins')}
                        </div>
                    </section>
                </div>
            `;
        }

        function renderStatsCard(label, val, icon, bg, text) {
            return `
                <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm flex items-center gap-5 hover:border-slate-300 transition-all group">
                    <div class="w-14 h-14 rounded-2xl ${bg} text-white flex items-center justify-center text-xl shadow-lg group-hover:scale-110 transition-transform">
                        <i class="fas ${icon}"></i>
                    </div>
                    <div>
                        <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1">${label}</div>
                        <div class="text-2xl font-black text-slate-800">${val}</div>
                    </div>
                </div>
            `;
        }

        function renderMiniCard(label, count, icon, color, page) {
            return `
                <button onclick="navigateTo('${page}')" class="p-4 rounded-xl bg-white border border-slate-100 hover:border-slate-300 hover:shadow-md transition-all flex flex-col items-center group text-center">
                    <div class="p-3 rounded-lg bg-slate-50 ${color} mb-3 group-hover:scale-110 transition-transform">
                        <i class="fas ${icon} text-lg"></i>
                    </div>
                    <div class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">${label}</div>
                    <div class="text-2xl font-black text-slate-800">${count}</div>
                </button>
            `;
        }

        function renderUsersByRole(role, title) {
            const filtered = usersData.filter(u => u.role === role);
            const rows = filtered.map(u => `
                <tr class="hover:bg-slate-50/50 transition-colors">
                    <td class="p-4">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-[10px] font-bold text-slate-500 uppercase">${(u.name || 'U').split(' ').map(n=>n[0]).join('')}</div>
                            <div>
                                <div class="font-bold text-slate-800 shadow-sm inline-block px-2 bg-white rounded">${u.name}</div>
                                <div class="text-[10px] text-slate-400 font-medium">${u.email}</div>
                            </div>
                        </div>
                    </td>
                    <td class="p-4">
                        <span class="text-[10px] font-bold px-2 py-1 rounded-full ${u.role === 'farmer' ? 'bg-blue-50 text-blue-600' : 'bg-slate-100 text-slate-600'} uppercase">Verified</span>
                    </td>
                    <td class="p-4 text-right">
                        <div class="flex gap-2 justify-end">
                            <button onclick="openEditModal('${u._id}')" class="p-2 rounded-lg bg-emerald-50 text-emerald-500 hover:bg-emerald-500 hover:text-white transition-all">
                                <i class="fas fa-edit text-xs"></i>
                            </button>
                            <button onclick="deleteUser('${u._id}')" class="p-2 rounded-lg bg-red-50 text-red-400 hover:bg-red-500 hover:text-white transition-all">
                                <i class="fas fa-trash-alt text-xs"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');

            return `
                <div class="space-y-6">
                    ${renderHeader(title)}
                    <div class="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 border-b border-slate-200">
                                <tr>
                                    <th class="p-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Entity Name</th>
                                    <th class="p-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Network Status</th>
                                    <th class="p-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100">
                                ${filtered.length ? rows : `<tr><td colspan="3" class="p-20 text-center text-slate-400 font-medium italic">No ${role}s found in the network.</td></tr>`}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        async function handleCreateUser(e) {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);

            try {
                const res = await fetch('/api/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) {
                    showToast('Entity Registered to Ledger');
                    toggleModal('add-user-modal', false);
                    form.reset();
                    await loadSystemData();
                } else {
                    alert('Registration failed: ' + (result.error || 'Unknown Error'));
                }
            } catch (err) {
                alert('Network error during registration. Check server logs.');
            }
        }

        function openEditModal(userId) {
            const user = usersData.find(u => u._id === userId);
            if (!user) return;

            document.getElementById('edit-user-id').value = user._id;
            document.getElementById('edit-user-name').value = user.name;
            document.getElementById('edit-user-email').value = user.email;
            document.getElementById('edit-user-role').value = user.role.toUpperCase();
            
            toggleModal('edit-user-modal', true);
        }

        async function handleUpdateUser(e) {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);
            const userId = data._id;

            // Remove password if empty to prevent overwriting with blank
            if (!data.password) delete data.password;
            // Remove _id from body as it's in the URL
            delete data._id;

            try {
                const res = await fetch(`/api/users/${userId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) {
                    showToast('Ledger Record Updated');
                    toggleModal('edit-user-modal', false);
                    await loadSystemData();
                } else {
                    alert('Update failed: ' + (result.error || 'Unknown Error'));
                }
            } catch (err) {
                alert('Network error during update.');
            }
        }

        async function deleteUser(id) {
            if (!confirm('Are you sure you want to remove this entity from the network?')) return;
            try {
                const res = await fetch(`/api/users/${id}`, { method: 'DELETE', credentials: 'include' });
                const result = await res.json();
                if (result.success) {
                    showToast('Entity Purged from Ledger');
                    await loadSystemData();
                } else {
                    showToast(result.error || 'Action rejected by system');
                }
            } catch (err) {
                showToast('Blockchain sync interrupted');
            }
        }

        function renderComplaints() {
            let rows = complaintsData.map(c => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-4 font-black text-slate-800 text-xs">#${c._id.slice(0, 6)}</td>
                    <td class="p-4 text-slate-600 font-bold text-xs">${c.type}</td>
                    <td class="p-4 text-[11px] text-slate-500 font-medium">${c.description}</td>
                    <td class="p-4"><span class="px-2 py-1 text-[9px] rounded-full bg-amber-100 text-amber-700 font-black uppercase tracking-widest">${c.status}</span></td>
                    <td class="p-4 text-right">
                        ${c.status !== 'Resolved' ? `<button onclick="updateComplaint('${c._id}', 'Resolved')" class="text-[9px] font-black uppercase tracking-widest bg-slate-900 text-white px-4 py-2 rounded-lg hover:opacity-90 transition-all">Resolve</button>` : `<span class="text-[9px] font-bold text-slate-300 uppercase tracking-widest">Archived</span>`}
                    </td>
                </tr>
            `).join('');
            return `${renderHeader('Escalated Complaints')} <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden"><table class="w-full text-left"><thead class="bg-slate-50 border-b border-slate-200"><tr><th class="p-4 text-slate-400 font-bold text-[10px] uppercase tracking-widest">ID</th><th class="p-4 text-slate-400 font-bold text-[10px] uppercase tracking-widest">Category</th><th class="p-4 text-slate-400 font-bold text-[10px] uppercase tracking-widest">Details</th><th class="p-4 text-slate-400 font-bold text-[10px] uppercase tracking-widest">Status</th><th class="p-4 text-right">Action</th></tr></thead><tbody class="divide-y divide-slate-100">${rows}</tbody></table></div>`;
        }

        function renderInvestigation() {
            return `
                ${renderHeader('Active Investigations')}
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="bg-white p-10 rounded-[2.5rem] border border-slate-200 shadow-sm space-y-6 relative overflow-hidden group">
                        <div class="absolute top-0 right-0 w-32 h-32 bg-rose-500/5 blur-3xl"></div>
                        <div class="flex justify-between items-start">
                            <span class="text-[9px] font-black text-rose-500 uppercase tracking-widest bg-rose-50 px-3 py-1.5 rounded-full">High Priority</span>
                        </div>
                        <h3 class="text-xl font-black text-slate-800">Cold Chain Breach (AgroDistribute)</h3>
                        <p class="text-sm text-slate-500 font-medium leading-relaxed">Multiple reports regarding compromised temperatures during southern transit. Automated sensor logs indicate 14% deviation.</p>
                        <div class="pt-6 border-t border-slate-100 flex justify-end gap-3">
                            <button onclick="showToast('Subpoena Requested')" class="bg-slate-100 px-5 py-2.5 rounded-xl text-[10px] font-black text-slate-600 hover:bg-slate-200 uppercase tracking-widest">Request Logs</button>
                            <button onclick="showToast('Api Restricted')" class="bg-rose-50 px-5 py-2.5 rounded-xl text-[10px] font-black text-rose-600 hover:bg-rose-100 uppercase tracking-widest">Suspend Access</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderHeader(title) {
            // Determine default role from title
            let defaultRole = null;
            if (title.includes('Farmer')) defaultRole = 'farmer';
            else if (title.includes('Distributor')) defaultRole = 'distributor';
            else if (title.includes('Consumer')) defaultRole = 'consumer';
            else if (title.includes('Regulatory')) defaultRole = 'regulator';
            else if (title.includes('Admin')) defaultRole = 'admin';

            return `
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center gap-6">
                        <button onclick="navigateTo('dashboard')" class="w-10 h-10 flex items-center justify-center hover:bg-slate-100 rounded-full text-slate-400 transition-all">
                            <i class="fas fa-arrow-left"></i>
                        </button>
                        <h2 class="text-3xl font-black text-slate-800 tracking-tight">${title}</h2>
                    </div>
                    ${currentPage !== 'dashboard' ? `
                        <button onclick="toggleModal('add-user-modal', true, '${defaultRole}')" class="bg-emerald-500 text-white px-5 py-3 rounded-xl text-xs font-black uppercase tracking-widest hover:bg-emerald-400 shadow-lg shadow-emerald-500/20 transition-all">
                            Add User
                        </button>
                    ` : ''}
                </div>
            `;
        }

        function toggleModal(id, show, defaultRole = null) {
            const el = document.getElementById(id);
            if (!el) return;
            
            if (show) {
                el.classList.remove('hidden');
                // If a default role is provided and we are opening the Add User modal
                if (id === 'add-user-modal' && defaultRole) {
                    const roleSelect = document.getElementById('roleSelect');
                    if (roleSelect) {
                        roleSelect.value = defaultRole;
                        // Trigger the farmer fields toggle
                        if (typeof toggleFarmerFields === 'function') toggleFarmerFields();
                    }
                }
            } else {
                el.classList.add('hidden');
            }
        }

        let pendingPurgeId = null;

        // Capture ID and show custom modal
        window.deleteUser = function(id) {
            pendingPurgeId = id;
            const modal = document.getElementById('purge-confirm-modal');
            if (modal) modal.classList.remove('hidden');
        };

        // Actual execution after user confirms in the custom modal
        window.executePurge = async function() {
            if (!pendingPurgeId) return;
            
            const btn = document.getElementById('confirm-purge-btn');
            const originalText = btn.innerText;
            btn.innerText = 'PURGING LEDGER...';
            btn.disabled = true;

            try {
                const res = await fetch(`/api/users/${pendingPurgeId}`, { method: 'DELETE', credentials: 'include' });
                const result = await res.json();
                
                if (result.success) {
                    showToast('Entity Purged from Ledger');
                    document.getElementById('purge-confirm-modal').classList.add('hidden');
                    await loadSystemData();
                } else {
                    showToast(result.error || 'Action rejected by system');
                }
            } catch (err) {
                console.error('Purge Error:', err);
                showToast('Blockchain sync interrupted');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
                pendingPurgeId = null;
            }
        };

        function showToast(msg) {
            const el = document.getElementById('notification');
            const txt = document.getElementById('notification-text');
            if (txt) txt.innerText = msg;
            if (el) el.classList.remove('hidden');
            setTimeout(() => { if(el) el.classList.add('hidden') }, 3000);
        }
    </script>
</body>
</html>
